# theme: jekyll-theme-cayman
# theme: jekyll-theme-hacker
markdown: kramdown
highlighter: rouge

# 站点短名（用于浏览器标题后缀，不写域名）
title: SUMSEC
description: SummerSec · 安全研究与笔记
# 首页 <title> 展示的座右铭
motto: 像清水一般清澈透明
title_separator: " · "
# 标题超过该字数（字符数）时，标签页内用 JS 滚动展示全文
title_scroll_threshold: 34

exclude:
  - CLAUDE.md

# GitHub Pages: process Markdown without --- front matter; use README as site index
plugins:
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-titles-from-headings

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
  - scope:
      path: "README.md"
    values:
      title: ""
  - scope:
      path: "resources/Archives.md"
    values:
      title: "归档"
  - scope:
      path: "resources/AboutMe.md"
    values:
      title: "关于"
