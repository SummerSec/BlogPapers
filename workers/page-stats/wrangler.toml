# 使用方式见 README.md
name = "sumsec-page-stats"
main = "src/index.js"
compatibility_date = "2024-11-01"

# 创建 KV：wrangler kv namespace create STATS
# 把下面 id 换成命令输出的 id
[[kv_namespaces]]
binding = "STATS"
id = "c8724f3f5c8640f69f38b8e93c556e1a"

[vars]
# 逗号分隔的完整 Origin（本地预览、GitHub Pages 等需显式写）
ALLOW_ORIGINS = "https://sumsec.me,https://www.sumsec.me,https://old.sumsec.me,http://127.0.0.1:4000,http://localhost:4000"
# 主域后缀：放行所有 https://*.该域 与 https://该域（与 ALLOW_ORIGINS 叠加）。设为空字符串可关闭。
ALLOW_HOST_SUFFIX = "sumsec.me"
