# 使用方式见 README.md
name = "sumsec-page-stats"
main = "src/index.js"
compatibility_date = "2024-11-01"

# 创建 KV：wrangler kv namespace create STATS
# 把下面 id 换成命令输出的 id
[[kv_namespaces]]
binding = "STATS"
id = "c8724f3f5c8640f69f38b8e93c556e1a"

[vars]
# 逗号分隔；博客所在域必须列入，否则浏览器 CORS 会拦截
ALLOW_ORIGINS = "https://sumsec.me,https://old.sumsec.me"
