# 通过 GitHub Actions 构建 Jekyll 并部署 Pages。
# 构建前在 runner 上注入 tags: blog-comments（不写回仓库）。
#
# 启用前请到：Settings → Pages → Build and deployment → Source 选「GitHub Actions」，
# 并关闭「从分支部署」；否则站点仍由旧流程构建，本 workflow 的部署步骤可能失败或与预期不一致。
#
# 说明：utterances 评论仅依赖 _config.yml / 布局脚本，不依赖各 md 的 tags；
# 本步骤仅在需要 Jekyll 侧 page.tags 等用途时使用。

name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Inject blog-comments into Markdown (CI workspace only)
        run: |
          pip install --quiet pyyaml
          python _scripts/add_blog_comments_tag.py

      - uses: actions/configure-pages@v5

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
