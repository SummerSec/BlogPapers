<h3 id="sensitive-keys-in-codebases">Sensitive keys in codebases</h3>

<p>在方法2的情况下，前提条件是可以访问pod，那就可以使用下面这条命令代替使用gitdump的方式。根据命令的执行结果，做一下命令的解读。</p>

<div class="language-bash highlighter-rouge"><div class="highlight"><pre class="highlight"><code><span class="nb">export </span><span class="nv">POD_NAME</span><span class="o">=</span><span class="si">$(</span>kubectl get pods <span class="nt">--namespace</span> default <span class="nt">-l</span> <span class="s2">"app=build-code"</span> <span class="nt">-o</span> <span class="nv">jsonpath</span><span class="o">=</span><span class="s2">"{.items[0].metadata.name}"</span><span class="si">)</span>
</code></pre></div></div>

<p><strong>kubectl get pods –namespace default</strong> 获取默认的命名空间</p>

<p><img src="https://img.sumsec.me/202207/202207281300237.png" alt="image-20220728130013942" /></p>
